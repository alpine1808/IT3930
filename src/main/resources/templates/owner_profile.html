<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .profile-container {
            max-width: 600px;
            margin: 2rem auto;
            background: var(--bg-surface);
            padding: 2rem;
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
        }
    </style>
</head>
<body class="dashboard-page">

    <!-- Top navigation -->
    <nav class="navbar">
        <div class="navbar__brand">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
            </svg>
            <span>My Profile</span>
        </div>
        <div class="navbar__right">
            <button class="btn-logout" onclick="window.location.href='/dashboard'">
                <span>Back to Dashboard</span>
            </button>
        </div>
    </nav>

    <main class="dashboard-content">
        <div class="profile-container">
            <h2 style="margin-bottom: 1.5rem;">Personal Information</h2>
            
            <form id="profileForm" onsubmit="updateProfile(event)">
                <div class="form-group">
                    <label>Email</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" th:value="${account.email}" required>
                    </div>
                </div>
                
                <div class="form-group" style="margin-top: 1rem;">
                    <label>Phone Number</label>
                    <div class="input-wrapper">
                        <input type="text" id="phone" th:value="${account.phone}">
                    </div>
                </div>
                
                <div class="form-group" style="margin-top: 1rem;">
                    <label>New Password (leave blank to keep current)</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" placeholder="New password">
                    </div>
                </div>
                
                <div class="form-group" style="margin-top: 1rem;">
                    <label>Role</label>
                    <div class="input-wrapper">
                        <input type="text" th:value="${account.role}" disabled style="background-color: var(--bg-page); color: var(--text-muted);">
                    </div>
                </div>

                <div id="profileAlert" class="alert" style="display:none; margin-top: 1rem;"></div>

                <button type="submit" class="btn-login" style="margin-top: 1.5rem;">Save Changes</button>
            </form>
        </div>
    </main>

    <script>
        async function updateProfile(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            
            const payload = { email, phone };
            if (password) {
                payload.password = password;
            }

            try {
                const res = await fetch('/api/accounts/me', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const alertBox = document.getElementById('profileAlert');
                if(res.ok) {
                    alertBox.className = 'alert alert--success';
                    alertBox.innerText = 'Profile updated successfully!';
                    alertBox.style.display = 'flex';
                    document.getElementById('password').value = ''; // clear password field
                } else {
                    alertBox.className = 'alert alert--error';
                    alertBox.innerText = 'Failed to update profile: ' + await res.text();
                    alertBox.style.display = 'flex';
                }
            } catch (e) {
                console.error(e);
            }
        }
    </script>
</body>
</html>
