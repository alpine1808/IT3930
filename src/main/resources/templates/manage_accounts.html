<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manage Accounts</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .apartment-checkbox-list {
            max-height: 200px;
            overflow-y: auto;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 0.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .apartment-checkbox-list label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            color: var(--text-primary);
            cursor: pointer;
            padding: 0.25rem;
            border-radius: 4px;
        }
        .apartment-checkbox-list label:hover {
            background: rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body class="dashboard-page">

    <!-- Top navigation -->
    <nav class="navbar">
        <div class="navbar__brand">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 21V5a2 2 0 0 1 2-2h6v18"/>
                <path d="M11 3h8a2 2 0 0 1 2 2v16H11"/>
            </svg>
            <span>Manage Accounts</span>
        </div>
        <div class="navbar__right">
            <button class="btn-logout" onclick="window.location.href='/dashboard'">
                <span>Back to Dashboard</span>
            </button>
        </div>
    </nav>

    <main class="dashboard-content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
            <h2>Manage Accounts</h2>
            <button class="btn-primary btn-small" onclick="openCreateModal()">+ New Account</button>
        </div>

        <h3 style="margin-top: 1.5rem; margin-bottom: 0.5rem; color: var(--text-primary);">Admins</h3>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Role</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="adminTableBody">
                </tbody>
            </table>
        </div>

        <h3 style="margin-top: 2rem; margin-bottom: 0.5rem; color: var(--text-primary);">Owners</h3>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Role</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="ownerTableBody">
                </tbody>
            </table>
        </div>

        <h3 style="margin-top: 2rem; margin-bottom: 0.5rem; color: var(--text-primary);">Staff</h3>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Role</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="staffTableBody">
                </tbody>
            </table>
        </div>
    </main>

    <!-- Create Modal -->
    <div id="createModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Create New Account</h2>
                <button class="close-btn" onclick="closeCreateModal()">&times;</button>
            </div>
            <form id="createAccountForm" onsubmit="createAccount(event)">
                <div id="createAlert" class="alert" style="display:none;"></div>
                <div class="form-group">
                    <label>Role</label>
                    <div class="input-wrapper">
                        <select id="createRole" required style="width: 100%; padding: 0.7rem 0.875rem; background: transparent; border: none; color: var(--text-primary); outline: none;">
                            <option value="ADMIN" style="color: #000">Admin</option>
                            <option value="STAFF" style="color: #000">Staff</option>
                            <option value="OWNER" style="color: #000">Owner</option>
                        </select>
                    </div>
                </div>
                <div class="form-group" style="margin-top: 1.25rem;">
                    <label>Email</label>
                    <div class="input-wrapper">
                        <input type="email" id="createEmail" required>
                    </div>
                </div>
                <div class="form-group" style="margin-top: 1.25rem;">
                    <label>Phone</label>
                    <div class="input-wrapper">
                        <input type="text" id="createPhone" required>
                    </div>
                </div>
                <div class="form-group" style="margin-top: 1.25rem;">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="createPassword" required>
                    </div>
                </div>
                <button type="submit" class="btn-login" style="margin-top: 1.5rem;">Create Account</button>
            </form>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit Account</h2>
                <button class="close-btn" onclick="closeEditModal()">&times;</button>
            </div>
            <form id="editAccountForm" onsubmit="updateAccount(event)">
                <div id="editAlert" class="alert" style="display:none;"></div>
                <input type="hidden" id="editAccountId">
                <div class="form-group" style="margin-top: 1.25rem;">
                    <label>Email</label>
                    <div class="input-wrapper">
                        <input type="email" id="editEmail" required>
                    </div>
                </div>
                <div class="form-group" style="margin-top: 1.25rem;">
                    <label>Phone</label>
                    <div class="input-wrapper">
                        <input type="text" id="editPhone" required>
                    </div>
                </div>
                <div class="form-group" style="margin-top: 1.25rem;">
                    <label>Password (Leave blank to keep current)</label>
                    <div class="input-wrapper">
                        <input type="password" id="editPassword">
                    </div>
                </div>
                <div class="form-group" style="margin-top: 1.25rem;">
                    <label>Status</label>
                    <div class="input-wrapper">
                        <select id="editIsActive" style="width: 100%; padding: 0.7rem 0.875rem; background: transparent; border: none; color: var(--text-primary); outline: none;">
                            <option value="true" style="color: #000">Active</option>
                            <option value="false" style="color: #000">Inactive</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn-login" style="margin-top: 1.5rem;">Save Changes</button>
            </form>
        </div>
    </div>

    <!-- Assign Modal -->
    <div id="assignModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Assign Apartments</h2>
                <button class="close-btn" onclick="closeAssignModal()">&times;</button>
            </div>
            <form id="assignApartmentsForm" onsubmit="saveAssignments(event)">
                <div id="assignAlert" class="alert" style="display:none;"></div>
                <input type="hidden" id="assignOwnerId">
                <div class="form-group">
                    <label>Select Apartments for this Owner</label>
                    <div class="apartment-checkbox-list" id="apartmentCheckboxList">
                        <!-- Populated via JS -->
                    </div>
                </div>
                <button type="submit" class="btn-login" style="margin-top: 1.5rem;">Save Assignments</button>
            </form>
        </div>
    </div>

    <script>
        let accounts = [];

        window.onload = () => {
            fetchAccounts();
        };

        function openCreateModal() { document.getElementById('createModal').classList.add('active'); }
        function closeCreateModal() { document.getElementById('createModal').classList.remove('active'); }

        function openEditModal(id) {
            const acc = accounts.find(a => a.id === id);
            if(acc) {
                document.getElementById('editAccountId').value = acc.id;
                document.getElementById('editEmail').value = acc.email;
                document.getElementById('editPhone').value = acc.phone;
                document.getElementById('editIsActive').value = acc.isActive ? "true" : "false";
                document.getElementById('editPassword').value = '';
                document.getElementById('editModal').classList.add('active');
            }
        }
        function closeEditModal() { document.getElementById('editModal').classList.remove('active'); }

        async function openAssignModal(id) {
            document.getElementById('assignOwnerId').value = id;
            document.getElementById('assignAlert').style.display = 'none';
            const listDiv = document.getElementById('apartmentCheckboxList');
            listDiv.innerHTML = 'Loading...';
            document.getElementById('assignModal').classList.add('active');

            try {
                // Fetch available and currently owned
                const [resAvail, resOwned] = await Promise.all([
                    fetch('/api/admin/apartments/available'),
                    fetch('/api/admin/accounts/' + id + '/apartments')
                ]);
                
                const available = await resAvail.json();
                const owned = await resOwned.json();

                listDiv.innerHTML = '';
                if (available.length === 0 && owned.length === 0) {
                    listDiv.innerHTML = '<div style="color:var(--text-muted); font-size:0.875rem;">No apartments available.</div>';
                    return;
                }

                // Render owned first (checked)
                owned.forEach(apt => {
                    listDiv.innerHTML += `
                        <label>
                            <input type="checkbox" name="apt_ids" value="${apt.id}" checked>
                            Block ${apt.name} (Floor ${apt.floor}, ${apt.area} sqm)
                        </label>
                    `;
                });

                // Render available (unchecked)
                available.forEach(apt => {
                    listDiv.innerHTML += `
                        <label>
                            <input type="checkbox" name="apt_ids" value="${apt.id}">
                            Block ${apt.name} (Floor ${apt.floor}, ${apt.area} sqm)
                        </label>
                    `;
                });

            } catch (err) {
                listDiv.innerHTML = '<div style="color:red;">Error loading apartments.</div>';
            }
        }
        function closeAssignModal() { document.getElementById('assignModal').classList.remove('active'); }

        async function saveAssignments(e) {
            e.preventDefault();
            const ownerId = document.getElementById('assignOwnerId').value;
            const checkboxes = document.querySelectorAll('input[name="apt_ids"]:checked');
            const apartmentIds = Array.from(checkboxes).map(cb => parseInt(cb.value));

            const res = await fetch('/api/admin/accounts/' + ownerId + '/apartments', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ apartmentIds })
            });

            const alertBox = document.getElementById('assignAlert');
            if(res.ok) {
                alertBox.className = 'alert alert--success';
                alertBox.innerHTML = 'Assignments saved successfully!';
                alertBox.style.display = 'flex';
                setTimeout(() => {
                    closeAssignModal();
                    alertBox.style.display = 'none';
                }, 1000);
            } else {
                alertBox.className = 'alert alert--error';
                alertBox.innerHTML = await res.text();
                alertBox.style.display = 'flex';
            }
        }

        async function fetchAccounts() {
            const res = await fetch('/api/admin/accounts');
            if(res.ok) {
                accounts = await res.json();
                const tbodyAdmin = document.getElementById('adminTableBody');
                const tbodyOwner = document.getElementById('ownerTableBody');
                const tbodyStaff = document.getElementById('staffTableBody');
                
                tbodyAdmin.innerHTML = '';
                tbodyOwner.innerHTML = '';
                tbodyStaff.innerHTML = '';

                accounts.forEach(acc => {
                    const statusBadge = acc.isActive ? 
                        '<span class="badge Staff">Active</span>' : 
                        '<span class="badge" style="background: rgba(239, 68, 68, 0.15); color: #fca5a5;">Inactive</span>';
                    
                    const roleBadge = `<span class="badge ${acc.role}">${acc.role}</span>`;
                    
                    let actions = `
                        <button class="btn-small btn-primary" onclick="openEditModal(${acc.id})">Edit</button>
                        <button class="btn-small btn-danger" onclick="deleteAccount(${acc.id})">Delete</button>
                    `;

                    // Add Assign button if OWNER
                    if (acc.role === 'OWNER') {
                        actions = `<button class="btn-small" style="background: var(--accent-owner); color: #000;" onclick="openAssignModal(${acc.id})">Assign</button>` + actions;
                    }

                    const rowHtml = `
                        <tr>
                            <td>${roleBadge}</td>
                            <td>${acc.email}</td>
                            <td>${acc.phone}</td>
                            <td>${statusBadge}</td>
                            <td class="actions-cell">
                                ${actions}
                            </td>
                        </tr>
                    `;

                    if (acc.role === 'ADMIN') tbodyAdmin.innerHTML += rowHtml;
                    else if (acc.role === 'OWNER') tbodyOwner.innerHTML += rowHtml;
                    else if (acc.role === 'STAFF') tbodyStaff.innerHTML += rowHtml;
                });
            }
        }

        async function createAccount(e) {
            e.preventDefault();
            const role = document.getElementById('createRole').value;
            const email = document.getElementById('createEmail').value;
            const phone = document.getElementById('createPhone').value;
            const password = document.getElementById('createPassword').value;
            
            const res = await fetch('/api/admin/accounts', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ role, email, phone, password })
            });
            const alertBox = document.getElementById('createAlert');
            if(res.ok) {
                alertBox.className = 'alert alert--success';
                alertBox.innerHTML = 'Account created successfully!';
                alertBox.style.display = 'flex';
                document.getElementById('createAccountForm').reset();
                fetchAccounts();
                setTimeout(closeCreateModal, 1000);
            } else {
                const text = await res.text();
                alertBox.className = 'alert alert--error';
                alertBox.innerHTML = text;
                alertBox.style.display = 'flex';
            }
        }

        async function updateAccount(e) {
            e.preventDefault();
            const id = document.getElementById('editAccountId').value;
            const email = document.getElementById('editEmail').value;
            const phone = document.getElementById('editPhone').value;
            const password = document.getElementById('editPassword').value;
            const isActive = document.getElementById('editIsActive').value === "true";
            
            const body = { email, phone, isActive };
            if(password) body.password = password;

            const res = await fetch('/api/admin/accounts/' + id, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            
            const alertBox = document.getElementById('editAlert');
            if(res.ok) {
                alertBox.className = 'alert alert--success';
                alertBox.innerHTML = 'Account updated successfully!';
                alertBox.style.display = 'flex';
                fetchAccounts();
                setTimeout(() => {
                    closeEditModal();
                    alertBox.style.display = 'none';
                }, 1000);
            } else {
                const text = await res.text();
                alertBox.className = 'alert alert--error';
                alertBox.innerHTML = text;
                alertBox.style.display = 'flex';
            }
        }

        async function deleteAccount(id) {
            if(!confirm('Are you sure you want to delete this account?')) return;
            const res = await fetch('/api/admin/accounts/' + id, { method: 'DELETE' });
            if(res.ok) {
                fetchAccounts();
            } else {
                alert('Failed to delete account: ' + await res.text());
            }
        }
    </script>
</body>
</html>
