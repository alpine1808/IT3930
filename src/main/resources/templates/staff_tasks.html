<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Tasks</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .list-section { margin-bottom: 2rem; }
        .list-section h3 { margin-bottom: 1rem; border-bottom: 2px solid var(--border); padding-bottom: 0.5rem; }
    </style>
</head>
<body class="dashboard-page">

    <nav class="navbar">
        <div class="navbar__brand">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 20h9"/>
                <path d="M16.376 3.622a1 1 0 0 1 3.002 3.002L7.368 18.635a2 2 0 0 1-.855.506l-2.872.838.838-2.872a2 2 0 0 1 .506-.854z"/>
            </svg>
            <span>My Tasks</span>
        </div>
        <div class="navbar__right">
            <button class="btn-logout" onclick="window.location.href='/dashboard'">
                <span>Back to Dashboard</span>
            </button>
        </div>
    </nav>

    <main class="dashboard-content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
            <h2>My Tasks</h2>
        </div>

        <div class="list-section">
            <h3 style="color: var(--accent-primary)">Static Tasks (Ongoing)</h3>
            <div class="table-container">
                <table>
                    <thead><tr><th>Title</th><th>Description</th></tr></thead>
                    <tbody id="staticTasksBody"><tr><td colspan="2" style="text-align: center;">Loading...</td></tr></tbody>
                </table>
            </div>
        </div>

        <div class="list-section">
            <h3 style="color: var(--accent-warning)">Dynamic Tasks (Not Done)</h3>
            <div class="table-container">
                <table>
                    <thead><tr><th>Title</th><th>Description</th></tr></thead>
                    <tbody id="dynamicNotDoneTasksBody"><tr><td colspan="2" style="text-align: center;">Loading...</td></tr></tbody>
                </table>
            </div>
        </div>

        <div class="list-section">
            <h3 style="color: var(--accent-success)">Dynamic Tasks (Done)</h3>
            <div class="table-container">
                <table>
                    <thead><tr><th>Title</th><th>Description</th></tr></thead>
                    <tbody id="dynamicDoneTasksBody"><tr><td colspan="2" style="text-align: center;">Loading...</td></tr></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        window.onload = () => {
            fetchTasks();
        };

        async function fetchTasks() {
            try {
                const res = await fetch('/api/staff/tasks');
                if(res.ok) {
                    const tasks = await res.json();
                    
                    const staticTasks = tasks.filter(t => t.type === 'STATIC');
                    const dynamicNotDone = tasks.filter(t => t.type === 'DYNAMIC' && !t.isDone);
                    const dynamicDone = tasks.filter(t => t.type === 'DYNAMIC' && t.isDone);

                    renderTable('staticTasksBody', staticTasks);
                    renderTable('dynamicNotDoneTasksBody', dynamicNotDone);
                    renderTable('dynamicDoneTasksBody', dynamicDone);
                } else {
                    document.getElementById('staticTasksBody').innerHTML = '<tr><td colspan="3" style="text-align: center; color: red;">Failed to load tasks.</td></tr>';
                }
            } catch (e) {
                console.error(e);
            }
        }

        function renderTable(tbodyId, taskList) {
            const tbody = document.getElementById(tbodyId);
            if (taskList.length === 0) {
                tbody.innerHTML = '<tr><td colspan="2" style="text-align: center;">No tasks found.</td></tr>';
                return;
            }
            tbody.innerHTML = taskList.map(task => `
                <tr>
                    <td style="font-weight: 600;">${task.title}</td>
                    <td>${task.description || ''}</td>
                </tr>
            `).join('');
        }
    </script>
</body>
</html>
